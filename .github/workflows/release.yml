name: publish-electron

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      # --- macOS: p12 ---
      - name: Prepare macOS signing certificate
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          echo "${{ secrets.APPLE_CERT_P12 }}" | base64 --decode > certificate.p12
          ls -la certificate.p12

      # --- Build bundles (vite/vue-tsc) ---
      # あなたの package.json が npm run build で vite+electron-builder まで行く場合、
      # ここでは electron-builder を直接叩きます（publishしない）
      - name: Package (macOS, signed, no publish)
        if: matrix.platform == 'mac'
        env:
          CSC_LINK: ./certificate.p12
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PWD }}
        run: npx electron-builder -c electron-builder.json5 --mac --publish never

      - name: Notarize & Staple DMG (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          DMG="$(find release -maxdepth 6 -type f -name "*-Mac-*-Installer.dmg" | head -n 1)"
          echo "DMG=$DMG"
          test -n "$DMG"

          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait

          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Cleanup certificate
        if: matrix.platform == 'mac'
        shell: bash
        run: rm -f certificate.p12

      - name: Package (Windows, no publish)
        if: matrix.platform == 'win'
        run: npx electron-builder -c electron-builder.json5 --win --publish never

      # --- 成果物を artifact に退避（ここ重要）---
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform }}
          path: |
            release/**/*.dmg
            release/**/*.zip
            release/**/*.exe
            release/**/*.blockmap
            release/**/latest*.yml
            release/**/app-update.yml

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download artifacts (mac)
        uses: actions/download-artifact@v4
        with:
          name: artifacts-mac
          path: artifacts

      - name: Download artifacts (win)
        uses: actions/download-artifact@v4
        with:
          name: artifacts-win
          path: artifacts

      - name: List files
        run: |
          echo "== artifacts =="
          find artifacts -type f -maxdepth 6 -print

      - name: Upload artifacts to GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "truckstacker ${{ github.ref_name }}"
          body: "Auto-built for macOS (universal, signed & notarized) and Windows."
          draft: true
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.blockmap
            artifacts/**/latest*.yml
            artifacts/**/app-update.yml
