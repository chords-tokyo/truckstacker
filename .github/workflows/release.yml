name: publish-electron

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci
      
      - name: Check notarize env (safe)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          test -n "$APPLE_ID" && echo "APPLE_ID: set" || (echo "APPLE_ID: MISSING" && exit 1)
          test -n "$APPLE_TEAM_ID" && echo "APPLE_TEAM_ID: set" || (echo "APPLE_TEAM_ID: MISSING" && exit 1)
          test -n "$APPLE_APP_SPECIFIC_PASSWORD" && echo "APPLE_APP_SPECIFIC_PASSWORD: set" || (echo "APPLE_APP_SPECIFIC_PASSWORD: MISSING" && exit 1)

      # ---------------- macOS: p12 をファイル化 ----------------
      - name: Prepare macOS signing certificate
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          echo "${{ secrets.APPLE_CERT_P12 }}" | base64 --decode > certificate.p12
          ls -la certificate.p12

      # ---------------- macOS: build + codesign + notarize ----------------
      - name: Build (macOS, signed & notarized)
        if: matrix.os == 'macos-latest'
        env:
          CSC_LINK: ./certificate.p12
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PWD }}

          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      # ---------------- Windows: build ----------------
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      # ---------------- macOS: notarization/staple 検証 ----------------
      - name: Verify notarization (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          echo "== outputs =="
          find release -maxdepth 6 -type f \( -name "*.dmg" -o -name "*.zip" \) -print || true

          DMG="$(find release -maxdepth 6 -type f -name "*-Mac-*-Installer.dmg" | head -n 1)"
          echo "DMG=$DMG"

          if [ -z "$DMG" ]; then
            echo "DMG not found in release/. Check directories.output / artifactName."
            exit 1
          fi

          xcrun stapler validate "$DMG"
          spctl -a -vvv --type open "$DMG"

      # ---------------- p12 を消す（念のため） ----------------
      - name: Cleanup certificate
        if: matrix.os == 'macos-latest'
        shell: bash
        run: rm -f certificate.p12

      # ---------------- Release 添付（Draft） ----------------
      - name: Upload artifacts to GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "truckstacker ${{ github.ref_name }}"
          body: "Auto-built for macOS (universal, signed & notarized) and Windows."
          draft: true
          prerelease: false
          files: |
            release/**/*
