name: publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'   # v0.1.0 などのタグで実行

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--target universal-apple-darwin'
          - os: windows-latest
            args: ''
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'  # pnpm なら 'pnpm' に変更

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS のときだけ universal 用ターゲットを追加
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install deps (frontend)
        run: npm ci

      # ---------- macOS 専用: Developer ID 証明書を一時キーチェーンにインポート ----------
      - name: Import Developer ID certificate (macOS only)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PWD: ${{ secrets.APPLE_CERT_PWD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/codesign.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"

          # 一時キーチェーン作成＆アンロック
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # base64 された .p12 を復元してインポート
          echo "$APPLE_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERT_PWD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # キーチェーン検索順序の先頭に持ってくる
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s "$KEYCHAIN_PATH"

          # codesign から秘密鍵を使えるように権限付与
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH" > /dev/null

      # ---------- Tauri ビルド（両OS）。ここでは Release 作成はしない ----------
      - name: Build Tauri (no release upload)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          # tagName 等を指定しないことで、このステップでは Release を作らずビルドだけ行う
          includeRelease: false
          includeDebug: false
          includeUpdaterJson: false

      # ---------- macOS 専用: Notarization ----------
      - name: Notarize app/dmg (macOS only)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_ID:      ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}   # App用パスワード
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH=$(ls src-tauri/target/release/bundle/macos/*.app | head -n 1 || true)
          DMG_PATH=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -n 1 || true)

          echo "APP_PATH=$APP_PATH"
          echo "DMG_PATH=$DMG_PATH"

          if [ -n "$APP_PATH" ]; then
            echo "Notarizing APP..."
            xcrun notarytool submit "$APP_PATH" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_PASSWORD" \
              --wait
          fi

          if [ -n "$DMG_PATH" ]; then
            echo "Notarizing DMG..."
            xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_PASSWORD" \
              --wait
          fi

      # ---------- macOS 専用: Staple（公証チケットを埋め込む） ----------
      - name: Staple tickets (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          APP_PATH=$(ls src-tauri/target/release/bundle/macos/*.app | head -n 1 || true)
          DMG_PATH=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -n 1 || true)

          if [ -n "$APP_PATH" ]; then
            echo "Stapling APP..."
            xcrun stapler staple "$APP_PATH"
          fi

          if [ -n "$DMG_PATH" ]; then
            echo "Stapling DMG..."
            xcrun stapler staple "$DMG_PATH"
          fi

      # ---------- GitHub Release へ成果物アップロード（OSごと） ----------
      - name: Upload artifacts to GitHub Release (macOS)
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true      # Draftとして作成（公開前に中身確認したければ）
          files: |
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to GitHub Release (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          # bundler によってパスが違うので、必要に応じて調整
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
