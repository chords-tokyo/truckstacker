name: publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'           # v0.2.0 などで実行（ブランチ運用なら適宜変更）

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--target universal-apple-darwin'   # 1ジョブでarm64+x64をまとめる
          - os: windows-latest
            args: ''
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'               # pnpm を使っているなら 'pnpm' に

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install deps (frontend)
        run: npm ci                  # pnpm 派なら: pnpm i --frozen-lockfile

      # 必要なら: npm run build（フロントエンドを事前ビルド）
      # - run: npm run build

      - name: Tauri build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}             # 例: v0.2.0
          releaseName: "TruckStacker ${{ github.ref_name }}"
          releaseBody: "Auto-built for macOS/Windows."
          releaseDraft: true
          prerelease: false
