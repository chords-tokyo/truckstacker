name: publish-electron

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: "--mac"
          - os: windows-latest
            args: "--win"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      # ---------------- macOS: p12 をファイル化 ----------------
      - name: Prepare macOS signing certificate
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          echo "${{ secrets.APPLE_CERT_P12 }}" | base64 --decode > certificate.p12

      # ---------------- macOS: build + codesign + notarize ----------------
      - name: Build Electron (macOS universal, signed & notarized)
        if: matrix.os == 'macos-latest'
        env:
          # codesign (Developer ID Application)
          CSC_LINK: ./certificate.p12
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PWD }}

          # notarization (Apple ID + App-specific password)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder -c electron-builder.json5 ${{ matrix.args }}

      # ---------------- macOS: notarization/staple 検証 ----------------
      - name: Verify notarization (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          echo "== outputs =="
          find dist -maxdepth 4 -type f \( -name "*.dmg" -o -name "*.zip" \) -print || true
          find release -maxdepth 6 -type f \( -name "*.dmg" -o -name "*.zip" \) -print || true

          DMG="$(find release -maxdepth 6 -type f -name "*-Mac-*-Installer.dmg" | head -n 1)"
          ZIP="$(find release -maxdepth 6 -type f -name "*-Mac-*-Installer.zip" | head -n 1)"

          echo "DMG=$DMG"
          echo "ZIP=$ZIP"

          if [ -n "$DMG" ]; then
            echo "== validate dmg =="
            xcrun stapler validate "$DMG"
            spctl -a -vvv --type open "$DMG"
          else
            echo "DMG not found in release/. Check directories.output / artifactName."
            exit 1
          fi

          if [ -n "$ZIP" ]; then
            echo "== validate zip (stapler may be N/A depending on how notarized) =="
            # zip は stapler validate が意味を持たない場合があるので、存在確認だけ
            ls -la "$ZIP"
          fi

      # ---------------- Windows: build ----------------
      - name: Build Electron (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder -c electron-builder.json5 ${{ matrix.args }}

      # ---------------- Release 添付（Draft） ----------------
      - name: Upload artifacts to GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "truckstacker ${{ github.ref_name }}"
          body: "Auto-built for macOS (universal, signed & notarized) and Windows."
          draft: true
          prerelease: false
          files: |
            release/**/*
