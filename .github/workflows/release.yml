name: publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'     # v0.1.0 などのタグで実行

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--target universal-apple-darwin'
          - os: windows-latest
            args: ''
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'  # pnpm の場合は 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install deps (frontend)
        run: npm ci

      # ---------------- macOS: 署名 + 公証 + Release upload ----------------
      - name: Build & Release Tauri (macOS, signed & notarized)
        if: matrix.os == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}

          # 署名用証明書（.p12 を base64 したもの＆そのパスワード）
          APPLE_CERTIFICATE:         ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERT_PWD }}

          # Signing Identity（TEAM ID だけでOK）
          APPLE_SIGNING_IDENTITY:    ${{ secrets.APPLE_TEAM_ID }}

          # 公証用 Apple ID 認証
          APPLE_ID:                  ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:            ${{ secrets.APPLE_PASSWORD }}  # App用パスワード
          APPLE_TEAM_ID:             ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "TruckStacker ${{ github.ref_name }}"
          releaseBody: "Auto-built (signed & notarized) for macOS."
          releaseDraft: true
          prerelease: false

      # ---------------- Windows: 従来どおりビルド + Release upload ---------
      - name: Build & Release Tauri (Windows)
        if: matrix.os == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "TruckStacker ${{ github.ref_name }} (Windows)"
          releaseBody: "Auto-built for Windows."
          releaseDraft: true
          prerelease: false
