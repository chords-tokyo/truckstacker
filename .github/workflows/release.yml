name: publish-electron

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# Release 作成・アップロードに必要
permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      # --- macOS: p12 をファイル化（electron-builder の CSC_LINK に渡す） ---
      - name: Prepare macOS signing certificate
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          echo "${{ secrets.APPLE_CERT_P12 }}" | base64 --decode > certificate.p12
          ls -la certificate.p12

      # --- Build & Publish (macOS) ---
      - name: Build & Publish (macOS)
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # codesign
          CSC_LINK: ./certificate.p12
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PWD }}

          # notarize（★変数名が重要）
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: npm run release

      - name: Cleanup certificate
        if: matrix.platform == 'mac'
        shell: bash
        run: rm -f certificate.p12

      # --- Build & Publish (Windows) ---
      - name: Build & Publish (Windows)
        if: matrix.platform == 'win'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
